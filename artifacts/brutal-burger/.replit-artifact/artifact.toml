kind = "web"
previewPath = "/"
title = "Brutal Burger"
version = "1.0.0"
id = "artifacts/brutal-burger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18229

[services.development]
run = "pnpm --filter @workspace/brutal-burger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/brutal-burger", "run", "build" ]
publicDir = "artifacts/brutal-burger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18229"
BASE_PATH = "/"
